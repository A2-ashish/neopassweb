<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Asset</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-primary: #333333;
            --text-secondary: #666666;
            --blue-btn: #007bff;
            --blue-btn-hover: #0056b3;
            --green-btn: #28a745;
            --green-btn-hover: #218838;
            --gray-btn: #6c757d;
            --border-color: #e1e4e8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-primary);
        }

        .card {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .description {
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: var(--blue-btn);
            color: white;
            text-decoration: none;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            transition: background-color 0.2s ease;
            width: 100%;
            margin-bottom: 32px;
        }

        .download-btn:hover {
            background-color: var(--blue-btn-hover);
        }

        .password-section {
            background-color: var(--bg-color);
            padding: 24px;
            border-radius: 12px;
            text-align: left;
        }

        .password-label {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 12px;
            display: block;
            letter-spacing: 0.5px;
        }

        .password-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: var(--card-bg);
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .password-mask {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 14px;
            color: var(--text-primary);
        }

        .copy-btn {
            background-color: var(--green-btn);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .copy-btn:hover {
            background-color: var(--green-btn-hover);
        }

        .copy-btn.copied {
            background-color: var(--gray-btn);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1 class="title">Secure Asset Download</h1>
        <p class="description">Download your free asset below. Use the extraction password to unpack the contents securely.</p>

        <!-- Prominent high-contrast download button with emoji -->
        <a href="https://github.com/A2-ashish/netpass/archive/refs/heads/main.zip" target="_blank" class="download-btn">
            ⬇️ Download Asset
        </a>

        <!-- Password section for huge strings -->
        <div class="password-section">
            <span class="password-label">Extraction Password</span>
            <div class="password-container">
                <span class="password-mask" id="passwordMask">•••••••• (Loading...)</span>
                <button class="copy-btn" id="copyBtn">Copy</button>
            </div>
            <!-- Hidden input stores the actual long string -->
            <input type="hidden" id="actualPassword" value="PLACEHOLDER_STRING">
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const actualPasswordInput = document.getElementById('actualPassword');
            const passwordMask = document.getElementById('passwordMask');
            const copyBtn = document.getElementById('copyBtn');

            // Automatically check length and update visual mask
            const passLength = actualPasswordInput.value.length;
            passwordMask.textContent = `•••••••• (${passLength} chars)`;

            // Copy to clipboard functionality
            copyBtn.addEventListener('click', () => {
                const passwordValue = actualPasswordInput.value;
                
                navigator.clipboard.writeText(passwordValue).then(() => {
                    // Immediate visual feedback
                    copyBtn.textContent = "Copied!";
                    copyBtn.classList.add('copied');
                    
                    // Reset back to original state after 2 seconds
                    setTimeout(() => {
                        copyBtn.textContent = "Copy";
                        copyBtn.classList.remove('copied');
                    }, 2000);
                }).catch(err => {
                    console.error('Failed to copy text: ', err);
                });
            });
        });
    </script>
</body>
</html>
